function normArea(a) {
  if (!a) return a;
  var i = a.indexOf(":");
  return i > 0 ? a.substring(0, i).trim() : a;
}

for (var _i = 0; _i < D.length; _i++) {
  D[_i].area = normArea(D[_i].area);
}

function flt() {
  var dep  = document.getElementById("fDep").value;
  var resp = document.getElementById("fResp").value;
  var area = document.getElementById("fArea").value;
  var out  = [];
  for (var i = 0; i < D.length; i++) {
    var r = D[i];
    if (dep  && r.dep  !== dep)  continue;
    if (resp && r.resp !== resp) continue;
    if (area && r.area !== area) continue;
    out.push(r);
  }
  return out;
}

function uniqVals(arr, key) {
  var seen = {}, out = [];
  for (var i = 0; i < arr.length; i++) {
    var v = arr[i][key];
    if (!seen[v]) { seen[v] = 1; out.push(v); }
  }
  return out;
}

function countVal(arr, key, val) {
  var n = 0;
  for (var i = 0; i < arr.length; i++) { if (arr[i][key] === val) n++; }
  return n;
}

function pad(n) { return n < 10 ? "0" + n : "" + n; }

function agHtml(data, colorFn) {
  var html = "";
  for (var di = 0; di < DAYS.length; di++) {
    var day  = DAYS[di];
    var acts = [];
    for (var i = 0; i < data.length; i++) {
      if (data[i].dia === day) acts.push(data[i]);
    }
    acts.sort(function(a,b){return a.h - b.h;});
    if (!acts.length) continue;
    html += '<div class="aday">';
    html += '<div class="adhdr" style="background:' + colorFn(di) + '">' + DLBL[di] + ' &nbsp;&#183;&nbsp; ' + acts.length + ' actividad' + (acts.length !== 1 ? "es" : "") + '</div>';

    // Agrupar por hora
    var grupos = {};
    for (var ai = 0; ai < acts.length; ai++) {
      var h = acts[ai].h;
      if (!grupos[h]) grupos[h] = [];
      grupos[h].push(acts[ai]);
    }
    var horas = [];
    for (var k in grupos) horas.push(parseInt(k, 10));
    horas.sort(function(a,b){return a - b;});

    for (var hi = 0; hi < horas.length; hi++) {
      var h   = horas[hi];
      var grp = grupos[h];
      var isM = h < 13;

      if (grp.length === 1) {
        // Una actividad — layout normal
        var a = grp[0];
        html += '<div class="ait">';
        html += '<div class="atm">' + pad(h) + ':00</div>';
        html += '<div class="abar" style="background:' + (AC[a.area] || "#ccc") + '"></div>';
        html += '<div class="abody">';
        html += '<div class="aact">' + a.act + '</div>';
        html += '<div class="amet">' + a.resp.split(" ")[0] + " &middot; " + a.area + '</div>';
        html += '<span class="abdg" style="background:' + (isM ? "#E1F5EE" : "#F4F6F9") + ';color:' + (isM ? "#0F6E56" : "#5F5E5A") + '">' + (isM ? "Manana" : "Tarde") + '</span>';
        html += '</div></div>';
      } else {
        // Varias actividades a la misma hora — layout horizontal
        html += '<div class="ait">';
        html += '<div class="atm">' + pad(h) + ':00</div>';
        html += '<div style="flex:1;display:grid;grid-template-columns:repeat(' + grp.length + ',1fr);gap:8px">';
        for (var gi = 0; gi < grp.length; gi++) {
          var a = grp[gi];
          html += '<div style="border-left:3px solid ' + (AC[a.area] || "#ccc") + ';padding-left:8px;min-width:0">';
          html += '<div class="aact" style="font-size:11px">' + a.act + '</div>';
          html += '<div class="amet">' + a.resp.split(" ")[0] + " &middot; " + a.area + '</div>';
          html += '<span class="abdg" style="background:' + (isM ? "#E1F5EE" : "#F4F6F9") + ';color:' + (isM ? "#0F6E56" : "#5F5E5A") + '">' + (isM ? "Manana" : "Tarde") + '</span>';
          html += '</div>';
        }
        html += '</div></div>';
      }
    }
    html += '</div>';
  }
  return html;
}

function renderJ() {
  var data = flt();
  var isAll = jornada === "a";
  var isM   = jornada === "m";
  var sub   = [];
  if (isAll) {
    sub = data;
  } else {
    for (var i = 0; i < data.length; i++) {
      if (isM ? data[i].h < 13 : data[i].h >= 13) sub.push(data[i]);
    }
  }
  var color = isM ? "#1D9E75" : (isAll ? "#1F4E79" : "#888780");
  var tecs  = uniqVals(sub, "resp").length;
  var ars   = uniqVals(sub, "area").length;
  var khtml = "";
  var ksub  = isAll ? "todas las jornadas" : (isM ? "00:00-12:59" : "13:00-23:59");
  var kdata = [[sub.length,"Actividades"],[tecs,"Responsables"],[ars,"Areas"]];
  for (var i = 0; i < kdata.length; i++) {
    khtml += '<div class="kcard"><div class="knum" style="color:' + color + '">' + kdata[i][0] + '</div>';
    khtml += '<div class="klbl">' + kdata[i][1] + '</div>';
    khtml += '<div class="ksub">' + ksub + '</div></div>';
  }
  document.getElementById("jkpis").innerHTML = khtml;
  document.getElementById("jag").innerHTML   = agHtml(sub, function(di) {
    return isAll ? DCOL[di] : color;
  });
}

function setJ(j) {
  jornada = j;
  document.getElementById("btnM").className = "jbtn" + (j === "m" ? " jm" : "");
  document.getElementById("btnT").className = "jbtn" + (j === "t" ? " jt" : "");
  document.getElementById("btnA").className = "jbtn" + (j === "a" ? " jm" : "");
  renderJ();
}

function render() {
  var data = flt();
  var M = [], T = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].h < 13) M.push(data[i]); else T.push(data[i]);
  }

  // KPIs
  var tecs  = uniqVals(M, "resp");
  var tname = [];
  for (var i = 0; i < tecs.length; i++) tname.push(tecs[i].split(" ")[0]);
  // Calcular dia mas activo y promedio real
  var diasConAct = {};
  for (var i = 0; i < data.length; i++) { diasConAct[data[i].dia] = (diasConAct[data[i].dia]||0)+1; }
  var topDia = ""; var topDiaN = 0;
  for (var dk in diasConAct) { if (diasConAct[dk] > topDiaN) { topDiaN = diasConAct[dk]; topDia = dk; } }
  var diasCount = Object.keys(diasConAct).length || 1;
  var promedio = Math.round(data.length / diasCount);

  var kdata = [
    ["bl", data.length, "Actividades totales", "en la semana", null],
    ["gr", tecs.length, "Tecnicos en campo",   tname.join(" · "), "Manana 00:00-12:59"],
    ["",   uniqVals(data,"area").length, "Areas visitadas", "", null],
    ["",   promedio, "Act. promedio/dia", topDia + " mas activo (" + topDiaN + ")", null]
  ];
  var khtml = "";
  for (var i = 0; i < kdata.length; i++) {
    var p = kdata[i];
    khtml += '<div class="kcard"><div class="knum' + (p[0] ? " " + p[0] : "") + '">' + p[1] + '</div>';
    khtml += '<div class="klbl">' + p[2] + '</div>';
    khtml += '<div class="ksub">' + p[3] + '</div>';
    if (p[4]) khtml += '<div class="ktag">' + p[4] + '</div>';
    khtml += '</div>';
  }
  document.getElementById("kpis").innerHTML = khtml;

  // Bar chart — pure HTML
  var mV = [], tV = [], maxV = 0;
  for (var i = 0; i < DAYS.length; i++) {
    var mv = countVal(M, "dia", DAYS[i]);
    var tv = countVal(T, "dia", DAYS[i]);
    mV.push(mv); tV.push(tv);
    if (mv + tv > maxV) maxV = mv + tv;
  }
  if (maxV === 0) maxV = 1;
  var bhtml = "";
  for (var i = 0; i < DAYS.length; i++) {
    var tot = mV[i] + tV[i];
    var mh  = Math.round(mV[i] / maxV * 110);
    var th  = Math.round(tV[i] / maxV * 110);
    bhtml += '<div class="bcol">';
    // Manana arriba, Tarde abajo
    if (mV[i] > 0) {
      bhtml += '<div style="width:80%;background:#1D9E75;height:' + mh + 'px;border-radius:2px 2px 0 0;display:flex;align-items:center;justify-content:center">';
      bhtml += '<span style="font-size:9px;font-weight:700;color:#fff">' + mV[i] + '</span></div>';
    }
    if (tV[i] > 0) {
      bhtml += '<div style="width:80%;background:#B4B2A9;height:' + th + 'px;display:flex;align-items:center;justify-content:center">';
      bhtml += '<span style="font-size:9px;font-weight:700;color:#fff">' + tV[i] + '</span></div>';
    }
    bhtml += '<div class="blbl">' + DLBL[i].substring(0, 3) + '</div>';
    bhtml += '</div>';
  }
  document.getElementById("barchart").innerHTML = bhtml;

  // Area table
  var areas    = uniqVals(data, "area");
  var areaData = [];
  for (var i = 0; i < areas.length; i++) {
    areaData.push({
      area: areas[i],
      tot:  countVal(data, "area", areas[i]),
      m:    countVal(M,    "area", areas[i]),
      t:    countVal(T,    "area", areas[i])
    });
  }
  areaData.sort(function(a,b){return b.tot - a.tot;});
  var gmax  = areaData.length ? areaData[0].tot : 1;
  var ahtml = "";
  for (var i = 0; i < areaData.length; i++) {
    var ad = areaData[i];
    ahtml += '<tr><td>';
    ahtml += '<div class="anc"><div class="adot" style="background:' + (AC[ad.area] || "#888") + '"></div><span>' + ad.area + '</span></div>';
    ahtml += '<div class="mbar"><div class="mbf" style="width:' + Math.round(ad.tot / gmax * 100) + '%;background:' + (AC[ad.area] || "#888") + '"></div></div>';
    ahtml += '</td>';
    ahtml += '<td class="tc tcm">' + (ad.m || "&#8212;") + '</td>';
    ahtml += '<td class="tc tct">' + (ad.t || "&#8212;") + '</td>';
    ahtml += '<td class="tc tctot">' + ad.tot + '</td></tr>';
  }
  document.getElementById("atb").innerHTML = ahtml;

  // Heatmap
  var hmEl = document.getElementById("hm");
  hmEl.style.gridTemplateColumns = "115px repeat(" + DAYS.length + ",1fr)";
  var hmC = ["transparent","#EAF3DE","#97C459","#BA7517","#E24B4A","#A32D2D"];
  var hmD = {};
  for (var bi = 0; bi < HOUR_BLOCKS.length; bi++) {
    var blk = HOUR_BLOCKS[bi];
    for (var di = 0; di < DAYS.length; di++) {
      var n = 0;
      for (var i = 0; i < data.length; i++) {
        if (data[i].dia === DAYS[di] && data[i].h >= blk.min && data[i].h <= blk.max) n++;
      }
      hmD[blk.label + "-" + DAYS[di]] = n;
    }
  }
  var hmMax = 0;
  for (var k in hmD) { if (hmD[k] > hmMax) hmMax = hmD[k]; }
  if (hmMax === 0) hmMax = 1;
  var hm = '<div class="hmc hmh"></div>';
  for (var di = 0; di < DAYS.length; di++) {
    hm += '<div class="hmc hmh">' + DLBL[di].substring(0,3) + '</div>';
  }
  for (var bi = 0; bi < HOUR_BLOCKS.length; bi++) {
    var blk = HOUR_BLOCKS[bi];
    hm += '<div class="hmc hml">' + blk.label + '</div>';
    for (var di = 0; di < DAYS.length; di++) {
      var v  = hmD[blk.label + "-" + DAYS[di]] || 0;
      var ci = v ? Math.max(1, Math.ceil(v / hmMax * 5)) : 0;
      var tc = ci >= 3 ? "#fff" : "#27500A";
      hm += '<div class="hmc" style="background:' + hmC[ci] + ';color:' + (v ? tc : "transparent") + '">' + (v || "") + '</div>';
    }
  }
  hmEl.innerHTML = hm;

  // Insights
  var topA = null;
  for (var i = 0; i < areaData.length; i++) {
    if (areaData[i].m > 0) { topA = areaData[i]; break; }
  }
  var topDM = {dia:"", n:0};
  for (var di = 0; di < DAYS.length; di++) {
    var n = countVal(M, "dia", DAYS[di]);
    if (n > topDM.n) topDM = {dia: DLBL[di], n: n};
  }
  // Top 2 temas
  var temaCount = {};
  for (var i = 0; i < data.length; i++) {
    var t = data[i].tema;
    if (t && t !== "") temaCount[t] = (temaCount[t] || 0) + 1;
  }
  var temaArr = [];
  for (var k in temaCount) temaArr.push({t:k, n:temaCount[k]});
  temaArr.sort(function(a,b){return b.n - a.n;});
  var top2 = temaArr.slice(0, 2);

  var ihtml = "";
  if (topA && M.length > 0) {
    var pct = Math.round(topA.m / M.length * 100);
    ihtml += '<div class="ins"><div class="iico" style="background:#E1F5EE"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="8" width="3" height="6" rx="1" fill="#1D9E75"/><rect x="6.5" y="5" width="3" height="9" rx="1" fill="#1D9E75"/><rect x="11" y="2" width="3" height="12" rx="1" fill="#1D9E75"/></svg></div>';
    ihtml += '<div><div class="mtag">Solo manana 00:00-12:59</div>';
    ihtml += '<div class="itit">' + topA.area + ' concentra el ' + pct + '% de visitas de campo</div>';
    ihtml += '<div class="isub">' + topA.m + ' de ' + M.length + ' salidas matutinas en esta area</div></div></div>';
    ihtml += '<div class="ins"><div class="iico" style="background:#E1F5EE"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 12L7 7l3 3 4-5" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>';
    ihtml += '<div><div class="mtag">Solo manana 00:00-12:59</div>';
    ihtml += '<div class="itit">' + topDM.dia + ' es el dia mas activo en campo</div>';
    ihtml += '<div class="isub">' + topDM.n + ' salidas matutinas — mayor presencia de tecnicos</div></div></div>';
  }
  if (top2.length > 0) {
    var temaSubtitle = top2.map(function(x){ return x.t + " (" + x.n + ")"; }).join(" &nbsp;&middot;&nbsp; ");
    ihtml += '<div class="ins"><div class="iico" style="background:#E6F1FB"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="2" rx="1" fill="#1565C0"/><rect x="2" y="7" width="8" height="2" rx="1" fill="#1565C0"/><rect x="2" y="11" width="10" height="2" rx="1" fill="#1565C0"/></svg></div>';
    ihtml += '<div><div class="mtag" style="background:#E6F1FB;color:#0C447C">Temas mas frecuentes</div>';
    ihtml += '<div class="itit">' + (top2[0] ? top2[0].t : "") + ' lidera las actividades</div>';
    ihtml += '<div class="isub">' + temaSubtitle + '</div></div></div>';
  }
  document.getElementById("ins").innerHTML = ihtml;




  // Por persona
  var rg = {};
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    if (!rg[r.resp]) rg[r.resp] = [];
    rg[r.resp].push(r);
  }
  var respKeys = Object.keys(rg).sort(function(a,b){ return rg[b].length - rg[a].length; });
  var phtml = "";
  for (var ri = 0; ri < respKeys.length; ri++) {
    var resp = respKeys[ri];
    var acts = rg[resp];
    var ini  = resp.split(" ").slice(0,2).map(function(w){return w[0];}).join("");
    var cm   = 0;
    for (var i = 0; i < acts.length; i++) { if (acts[i].h < 13) cm++; }
    acts.sort(function(a,b){
      return DAYS.indexOf(a.dia) - DAYS.indexOf(b.dia) || a.h - b.h;
    });
    phtml += '<div class="rcard">';
    phtml += '<div class="rhdr">';
    phtml += '<div class="rav">' + ini + '</div>';
    phtml += '<div><div class="rname">' + resp + '</div>';
    phtml += '<div class="rsub">' + cm + ' en campo &middot; ' + (acts.length - cm) + ' en gabinete</div></div>';
    phtml += '<div class="rcnt">' + acts.length + '</div>';
    phtml += '</div>';
    var prevDia = "";
    for (var i = 0; i < acts.length; i++) {
      var a = acts[i];
      // Separador entre dias (incluyendo el primero)
      if (a.dia !== prevDia) {
        phtml += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0">';
        phtml += '<div style="height:1px;flex:1;background:linear-gradient(to right,#1F4E79,transparent)"></div>';
        phtml += '<div style="font-size:9px;font-weight:700;color:#1F4E79;letter-spacing:.08em;white-space:nowrap">' + DLBL[DAYS.indexOf(a.dia)].toUpperCase() + '</div>';
        phtml += '<div style="height:1px;flex:1;background:linear-gradient(to left,#1F4E79,transparent)"></div>';
        phtml += '</div>';
      }
      prevDia = a.dia;
      phtml += '<div class="arow">';
      phtml += '<div class="art" style="width:80px;flex-shrink:0">' + DLBL[DAYS.indexOf(a.dia)].substring(0,3) + ' ' + pad(a.h) + ':00</div>';
      phtml += '<div class="ardot" style="background:' + (AC[a.area]||"#ccc") + '"></div>';
      phtml += '<div class="arn">' + a.act + '</div>';
      phtml += '</div>';
    }
    phtml += '</div>';
  }
  document.getElementById("pc").innerHTML = phtml;

  renderJ();
}

function switchTab(tab, btn) {
  var tabs  = document.querySelectorAll(".tab");
  var views = document.querySelectorAll(".view");
  for (var i = 0; i < tabs.length;  i++) tabs[i].classList.remove("on");
  for (var i = 0; i < views.length; i++) views[i].classList.remove("on");
  btn.classList.add("on");
  document.getElementById("view-" + tab).classList.add("on");
  if (tab === "agenda") renderJ();
}

// Populate filter dropdowns
var deps  = uniqVals(D, "dep");
var resps = uniqVals(D, "resp");
var areas = uniqVals(D, "area");
for (var i = 0; i < deps.length;  i++) { var o=document.createElement("option"); o.value=o.textContent=deps[i];  document.getElementById("fDep").appendChild(o);  }
for (var i = 0; i < resps.length; i++) { var o=document.createElement("option"); o.value=o.textContent=resps[i]; document.getElementById("fResp").appendChild(o); }
for (var i = 0; i < areas.length; i++) { var o=document.createElement("option"); o.value=o.textContent=areas[i]; document.getElementById("fArea").appendChild(o); }

render();
</script>
